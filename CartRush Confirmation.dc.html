<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Narrow:wght@600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #c9ccd2; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Archivo', sans-serif; }
  @keyframes cr-pop { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.12); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes cr-ring { 0% { transform: scale(.6); opacity: .55; } 100% { transform: scale(2.1); opacity: 0; } }
  @keyframes cr-check { 0% { stroke-dashoffset: 40; } 100% { stroke-dashoffset: 0; } }
  @keyframes cr-fall { 0% { transform: translateY(-22px) rotate(var(--r)); opacity: 0; } 18% { opacity: 1; } 100% { transform: translateY(14px) rotate(calc(var(--r) + 28deg)); opacity: 1; } }
  @keyframes cr-rise { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .cf { position: absolute; animation: cr-fall 1.1s ease-out both; }
  .cr-card { animation: cr-rise .6s ease-out .35s both; }
</style>
</helmet>

<div style="position: relative; width: 393px; height: 852px; background: #fff; border-radius: 54px; box-shadow: 0 40px 90px rgba(0,0,0,.35), 0 0 0 11px #1b1c20, 0 0 0 13px #2c2e34; overflow: hidden; font-family: 'Archivo', sans-serif; color: #15161a;">

  <!-- soft top wash -->
  <div style="position: absolute; top: 0; left: 0; right: 0; height: 360px; background: linear-gradient(180deg, #fff5f8 0%, #ffffff 100%); z-index: 0;"></div>

  <!-- Status bar -->
  <div style="position: absolute; top: 0; left: 0; right: 0; height: 54px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 30px 9px; z-index: 40;">
    <div style="font-size: 15px; font-weight: 700;">9:41</div>
    <div style="display: flex; align-items: center; gap: 7px;">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="#15161a"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="#15161a"/><rect x="10" y="2" width="3" height="10" rx="1" fill="#15161a"/><rect x="15" y="0" width="3" height="12" rx="1" fill="#15161a" opacity=".35"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 2.5c2.3 0 4.4.9 6 2.4l1.2-1.3C13.8 1.7 11.3.7 8.5.7S3.2 1.7 1.3 3.6L2.5 4.9c1.6-1.5 3.7-2.4 6-2.4z" fill="#15161a"/><circle cx="8.5" cy="9.8" r="1.6" fill="#15161a"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#15161a" stroke-opacity=".4"/><rect x="2" y="2" width="16.5" height="8" rx="1.5" fill="#15161a"/><rect x="23" y="4" width="1.5" height="4" rx=".75" fill="#15161a" fill-opacity=".4"/></svg>
    </div>
  </div>

  <!-- Confetti field (top 40%) -->
  <div style="position: absolute; top: 60px; left: 0; right: 0; height: 300px; z-index: 5; pointer-events: none;">
    <div class="cf" style="left: 28px;  top: 30px;  --r: -18deg; animation-delay: .05s; width: 8px;  height: 14px; border-radius: 2px; background: #FF2060;"></div>
    <div class="cf" style="left: 64px;  top: 8px;   --r: 24deg;  animation-delay: .22s; width: 7px;  height: 7px;  border-radius: 50%; background: #FFB400;"></div>
    <div class="cf" style="left: 96px;  top: 54px;  --r: -40deg; animation-delay: .12s; width: 9px;  height: 9px;  border-radius: 2px; background: #FF7A1A;"></div>
    <div class="cf" style="left: 140px; top: 18px;  --r: 12deg;  animation-delay: .30s; width: 6px;  height: 16px; border-radius: 3px; background: #FF2060;"></div>
    <div class="cf" style="left: 188px; top: 6px;   --r: -28deg; animation-delay: .08s; width: 8px;  height: 8px;  border-radius: 50%; background: #FF7A1A;"></div>
    <div class="cf" style="left: 232px; top: 40px;  --r: 36deg;  animation-delay: .26s; width: 7px;  height: 14px; border-radius: 2px; background: #FFB400;"></div>
    <div class="cf" style="left: 276px; top: 14px;  --r: -14deg; animation-delay: .16s; width: 9px;  height: 9px;  border-radius: 2px; background: #FF2060;"></div>
    <div class="cf" style="left: 318px; top: 44px;  --r: 20deg;  animation-delay: .34s; width: 6px;  height: 6px;  border-radius: 50%; background: #FF7A1A;"></div>
    <div class="cf" style="left: 352px; top: 20px;  --r: -34deg; animation-delay: .10s; width: 8px;  height: 15px; border-radius: 3px; background: #FFB400;"></div>
    <div class="cf" style="left: 16px;  top: 92px;  --r: 30deg;  animation-delay: .28s; width: 7px;  height: 7px;  border-radius: 2px; background: #FF7A1A;"></div>
    <div class="cf" style="left: 52px;  top: 120px; --r: -22deg; animation-delay: .18s; width: 6px;  height: 14px; border-radius: 3px; background: #FFB400;"></div>
    <div class="cf" style="left: 116px; top: 104px; --r: 16deg;  animation-delay: .40s; width: 8px;  height: 8px;  border-radius: 50%; background: #FF2060;"></div>
    <div class="cf" style="left: 264px; top: 110px; --r: -36deg; animation-delay: .14s; width: 9px;  height: 9px;  border-radius: 2px; background: #FF7A1A;"></div>
    <div class="cf" style="left: 312px; top: 96px;  --r: 26deg;  animation-delay: .32s; width: 6px;  height: 15px; border-radius: 3px; background: #FF2060;"></div>
    <div class="cf" style="left: 356px; top: 124px; --r: -12deg; animation-delay: .20s; width: 7px;  height: 7px;  border-radius: 50%; background: #FFB400;"></div>
    <div class="cf" style="left: 36px;  top: 186px; --r: 22deg;  animation-delay: .36s; width: 8px;  height: 14px; border-radius: 2px; background: #FF2060;"></div>
    <div class="cf" style="left: 332px; top: 188px; --r: -26deg; animation-delay: .24s; width: 7px;  height: 13px; border-radius: 3px; background: #FF7A1A;"></div>
    <div class="cf" style="left: 80px;  top: 232px; --r: 14deg;  animation-delay: .44s; width: 6px;  height: 6px;  border-radius: 50%; background: #FFB400;"></div>
    <div class="cf" style="left: 300px; top: 236px; --r: -30deg; animation-delay: .38s; width: 8px;  height: 8px;  border-radius: 2px; background: #FF2060;"></div>
  </div>

  <!-- Checkmark hero -->
  <div style="position: absolute; top: 150px; left: 50%; transform: translateX(-50%); z-index: 20; display: flex; flex-direction: column; align-items: center;">
    <div style="position: relative; width: 108px; height: 108px; display: flex; align-items: center; justify-content: center;">
      <div style="position: absolute; inset: 0; border-radius: 50%; border: 2px solid #FF2060; animation: cr-ring 1.4s ease-out .3s infinite;"></div>
      <div style="width: 96px; height: 96px; border-radius: 50%; background: linear-gradient(135deg, #FF2060, #FF5C3A); display: flex; align-items: center; justify-content: center; box-shadow: 0 16px 36px rgba(255,32,96,.4); animation: cr-pop .5s cubic-bezier(.2,1.4,.4,1) both;">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M14 25l7 7 14-15" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="40" style="animation: cr-check .4s ease-out .55s both;"/></svg>
      </div>
    </div>
  </div>

  <!-- Order number + title -->
  <div style="position: absolute; top: 286px; left: 0; right: 0; text-align: center; z-index: 20; animation: cr-rise .55s ease-out .25s both;">
    <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13px; letter-spacing: 1.5px; color: #FF2060; background: #ffe6ee; display: inline-block; padding: 4px 12px; border-radius: 8px; margin-bottom: 14px;">CR-2026-48721</div>
    <div style="font-size: 27px; font-weight: 800; letter-spacing: -.4px;">Ordine confermato</div>
    <div style="font-size: 14px; font-weight: 500; color: #8a8d95; margin-top: 6px;">Grazie! Te lo prepariamo subito.</div>
  </div>

  <!-- Summary card -->
  <div class="cr-card" style="position: absolute; top: 410px; left: 22px; right: 22px; background: #fff; border: 1px solid #f0f1f3; border-radius: 22px; box-shadow: 0 14px 38px rgba(20,22,26,.08); padding: 20px; z-index: 20;">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;">
      <div style="display: flex; align-items: center;">
        <div style="width: 44px; height: 44px; border-radius: 50%; background: #f1f1f3; background-image: repeating-linear-gradient(45deg, #efeff2 0 6px, #e7e7ec 6px 12px); border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.06);"></div>
        <div style="width: 44px; height: 44px; border-radius: 50%; background: #f1f1f3; background-image: repeating-linear-gradient(45deg, #efeff2 0 6px, #e7e7ec 6px 12px); border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.06); margin-left: -14px;"></div>
        <div style="width: 44px; height: 44px; border-radius: 50%; background: #f1f1f3; background-image: repeating-linear-gradient(45deg, #efeff2 0 6px, #e7e7ec 6px 12px); border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.06); margin-left: -14px;"></div>
      </div>
      <span style="font-size: 13px; font-weight: 600; color: #8a8d95;">3 prodotti</span>
    </div>

    <div style="height: 1px; background: #f0f1f3; margin-bottom: 16px;"></div>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
      <span style="font-size: 14px; font-weight: 600; color: #494c54;">Totale</span>
      <span style="font-family: 'Archivo Narrow', sans-serif; font-weight: 800; font-size: 26px; color: #15161a; letter-spacing: -.3px;">€147,50</span>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-between;">
      <span style="font-size: 14px; font-weight: 600; color: #494c54;">Spedizione</span>
      <div style="display: flex; align-items: center; gap: 6px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 7h11v8H3V7zM14 10h4l3 3v2h-7V10z" stroke="#16a34a" stroke-width="1.8" stroke-linejoin="round"/><circle cx="7" cy="17" r="1.8" stroke="#16a34a" stroke-width="1.8"/><circle cx="17.5" cy="17" r="1.8" stroke="#16a34a" stroke-width="1.8"/></svg>
        <span style="font-size: 13px; font-weight: 700; color: #16a34a;">Express 1-2 giorni</span>
      </div>
    </div>
  </div>

  <!-- Buttons -->
  <div style="position: absolute; bottom: 0; left: 0; right: 0; padding: 0 22px 14px; z-index: 30;">
    <button style="width: 100%; height: 56px; border: none; border-radius: 18px; background: #FF2060; color: #fff; font-family: 'Archivo', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: .2px; display: flex; align-items: center; justify-content: center; gap: 9px; box-shadow: 0 12px 26px rgba(255,32,96,.32); cursor: pointer;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 12h13M16 5l5 7-5 7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Traccia il tuo ordine
    </button>
    <div style="text-align: center; padding: 16px 0 12px;">
      <span style="font-size: 14px; font-weight: 700; color: #494c54;">Continua lo shopping</span>
    </div>
    <div style="width: 134px; height: 5px; background: #15161a; border-radius: 3px; margin: 4px auto 0;"></div>
  </div>

</div>
</x-dc>
</body>
</html>
