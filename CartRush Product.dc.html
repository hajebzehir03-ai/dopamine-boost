<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Narrow:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #c9ccd2; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Archivo', sans-serif; }
</style>
</helmet>

<div style="position: relative; width: 393px; height: 852px; background: #ffffff; border-radius: 54px; box-shadow: 0 40px 90px rgba(0,0,0,.35), 0 0 0 11px #1b1c20, 0 0 0 13px #2c2e34; overflow: hidden; font-family: 'Archivo', sans-serif; color: #15161a;">

  <!-- Product image (full-width, ~60% height) -->
  <div style="position: absolute; top: 0; left: 0; right: 0; height: 530px; background: #f1f1f3; background-image: repeating-linear-gradient(45deg, #efeff2 0 11px, #e7e7ec 11px 22px);"></div>

  <!-- Top controls over image -->
  <div style="position: absolute; top: 60px; left: 0; right: 0; padding: 0 18px; display: flex; align-items: center; justify-content: space-between; z-index: 30;">
    <div style="width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,.9); backdrop-filter: blur(8px); box-shadow: 0 4px 12px rgba(0,0,0,.08); display: flex; align-items: center; justify-content: center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="#15161a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div style="display: flex; gap: 10px;">
      <div style="width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,.9); backdrop-filter: blur(8px); box-shadow: 0 4px 12px rgba(0,0,0,.08); display: flex; align-items: center; justify-content: center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5.5 6 5.5c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.5 0 5 3.5 3.5 6.5C19 16.5 12 21 12 21z" stroke="#15161a" stroke-width="1.9" stroke-linejoin="round"/></svg>
      </div>
      <div style="width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,.9); backdrop-filter: blur(8px); box-shadow: 0 4px 12px rgba(0,0,0,.08); display: flex; align-items: center; justify-content: center;">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="12" r="2.1" stroke="#15161a" stroke-width="1.9"/><circle cx="17" cy="6" r="2.1" stroke="#15161a" stroke-width="1.9"/><circle cx="17" cy="18" r="2.1" stroke="#15161a" stroke-width="1.9"/><path d="M7.8 11l7.4-4M7.8 13l7.4 4" stroke="#15161a" stroke-width="1.9"/></svg>
      </div>
    </div>
  </div>

  <!-- Sale badge on image -->
  <div style="position: absolute; top: 120px; left: 18px; z-index: 25; background: #FF2060; color: #fff; font-family: 'Archivo Narrow', sans-serif; font-weight: 800; font-size: 15px; padding: 5px 11px; border-radius: 8px; box-shadow: 0 6px 16px rgba(255,32,96,.35);">-40%</div>

  <!-- Image pagination dots -->
  <div style="position: absolute; top: 500px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 25;">
    <div style="width: 18px; height: 5px; border-radius: 3px; background: #FF2060;"></div>
    <div style="width: 5px; height: 5px; border-radius: 3px; background: rgba(21,22,26,.22);"></div>
    <div style="width: 5px; height: 5px; border-radius: 3px; background: rgba(21,22,26,.22);"></div>
    <div style="width: 5px; height: 5px; border-radius: 3px; background: rgba(21,22,26,.22);"></div>
  </div>

  <!-- Floating bottom card -->
  <div style="position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 28px 28px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,.10); padding: 22px 22px 0; z-index: 40;">

    <!-- grabber -->
    <div style="width: 38px; height: 4px; border-radius: 3px; background: #e6e8ec; margin: 0 auto 16px;"></div>

    <!-- category -->
    <div style="font-size: 10px; font-weight: 700; letter-spacing: 1px; color: #b0b3ba; text-transform: uppercase; margin-bottom: 6px;">Moda · Felpe</div>

    <!-- title -->
    <div style="font-size: 21px; font-weight: 700; line-height: 1.22; letter-spacing: -.2px; margin-bottom: 9px;">Felpa oversize con cappuccio in cotone</div>

    <!-- rating -->
    <div style="display: flex; align-items: center; gap: 5px; margin-bottom: 14px;">
      <div style="display: flex; gap: 1px;">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1l1.6 3.3 3.6.5-2.6 2.5.6 3.6-3.2-1.7L3.3 11l.6-3.6L1.3 4.8l3.6-.5L6.5 1z" fill="#FFB400"/></svg>
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1l1.6 3.3 3.6.5-2.6 2.5.6 3.6-3.2-1.7L3.3 11l.6-3.6L1.3 4.8l3.6-.5L6.5 1z" fill="#FFB400"/></svg>
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1l1.6 3.3 3.6.5-2.6 2.5.6 3.6-3.2-1.7L3.3 11l.6-3.6L1.3 4.8l3.6-.5L6.5 1z" fill="#FFB400"/></svg>
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1l1.6 3.3 3.6.5-2.6 2.5.6 3.6-3.2-1.7L3.3 11l.6-3.6L1.3 4.8l3.6-.5L6.5 1z" fill="#FFB400"/></svg>
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1l1.6 3.3 3.6.5-2.6 2.5-.6-.3V1z" fill="#FFB400"/><path d="M6.5 1l1.6 3.3 3.6.5-2.6 2.5.6 3.6-3.2-1.7L3.3 11l.6-3.6L1.3 4.8l3.6-.5L6.5 1z" stroke="#FFB400" stroke-width="1"/></svg>
      </div>
      <span style="font-size: 12px; font-weight: 700; color: #15161a;">4.8</span>
      <span style="font-size: 12px; color: #b0b3ba;">(128)</span>
    </div>

    <!-- price -->
    <div style="display: flex; align-items: baseline; gap: 9px; margin-bottom: 18px;">
      <span style="font-family: 'Archivo Narrow', sans-serif; font-weight: 800; font-size: 34px; color: #FF2060; letter-spacing: -.5px;">17€</span>
      <span style="font-size: 15px; color: #b0b3ba; text-decoration: line-through;">29€</span>
      <span style="font-size: 11px; font-weight: 700; color: #FF2060; background: #ffe6ee; padding: 3px 8px; border-radius: 6px;">RISPARMI 12€</span>
    </div>

    <!-- size selector -->
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px;">
      <span style="font-size: 13px; font-weight: 700;">Taglia</span>
      <span style="font-size: 12px; font-weight: 600; color: #FF2060;">Guida taglie</span>
    </div>
    <div style="display: flex; gap: 9px; margin-bottom: 22px;">
      <div style="width: 50px; height: 44px; border-radius: 13px; border: 1.5px solid #e6e8ec; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #494c54;">S</div>
      <div style="width: 50px; height: 44px; border-radius: 13px; background: #15161a; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff;">M</div>
      <div style="width: 50px; height: 44px; border-radius: 13px; border: 1.5px solid #e6e8ec; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #494c54;">L</div>
      <div style="width: 50px; height: 44px; border-radius: 13px; border: 1.5px solid #e6e8ec; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #494c54;">XL</div>
    </div>

    <!-- CTA -->
    <button style="width: 100%; height: 56px; border: none; border-radius: 18px; background: #FF2060; color: #fff; font-family: 'Archivo', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: .2px; display: flex; align-items: center; justify-content: center; gap: 9px; box-shadow: 0 12px 26px rgba(255,32,96,.32); cursor: pointer;">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M3 4h2.5l1.8 11.2a1.5 1.5 0 001.5 1.3h8.4a1.5 1.5 0 001.5-1.2L20.5 8H6.2" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9.5" cy="20" r="1.5" fill="#fff"/><circle cx="17.5" cy="20" r="1.5" fill="#fff"/></svg>
      Aggiungi al carrello
    </button>

    <!-- subtext -->
    <div style="text-align: center; padding: 11px 0 14px; font-size: 12px; font-weight: 500; color: #a8abb2;">Nessun costo reale · solo simulazione</div>

    <!-- home indicator -->
    <div style="width: 134px; height: 5px; background: #15161a; border-radius: 3px; margin: 0 auto 10px;"></div>
  </div>

</div>
</x-dc>
</body>
</html>
